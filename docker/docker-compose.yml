services:
  server:
    build:
      context: ..
      dockerfile: docker/server.Dockerfile
    container_name: pixel-vpn-server
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 8787
      DATABASE_URL: mysql://${MYSQL_USER:-pixelvpn}:${MYSQL_PASSWORD:-pixelvpn}@mysql:3306/${MYSQL_DATABASE:-pixelvpn}
      DATABASE_ADMIN_URL: mysql://root:${MYSQL_ROOT_PASSWORD:-root}@mysql:3306/${MYSQL_DATABASE:-pixelvpn}
      JWT_SECRET: ${JWT_SECRET:-change_this_to_a_long_random_string_1234567890}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    ports:
      - "8787:8787"
    networks:
      - vpn

  mysql:
    image: mysql:8.4
    container_name: pixel-vpn-mysql
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_ROOT_HOST: "%"
      MYSQL_DATABASE: ${MYSQL_DATABASE:-pixelvpn}
      MYSQL_USER: ${MYSQL_USER:-pixelvpn}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-pixelvpn}
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -proot --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - vpn

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: pixel-vpn-phpmyadmin
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root
      UPLOAD_LIMIT: 128M
    ports:
      - "8081:80"
    networks:
      - vpn

networks:
  vpn:
    driver: bridge

volumes:
  mysql-data:
